<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/geral :: head}"></head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <nav th:replace="~{fragments/geral :: navbar}"></nav>
    <aside th:replace="~{fragments/geral :: sidebar}"></aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid"><h1>Editar Cobrança</h1></div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="card card-primary">
                    <div class="card-header"><h3 class="card-title">Dados do Título</h3></div>

                    <form action="/titulos/salvar" method="post" th:object="${titulo}">
                        <div class="card-body">
                            <input type="hidden" th:field="*{id}">

                            <div class="form-group">
                                <label>Cliente</label>
                                <select name="clienteId" class="form-control" required>
                                    <option th:each="c : ${clientes}"
                                            th:value="${c.id}"
                                            th:text="${c.nomeEmpresa}"
                                            th:selected="${c.id == titulo.cliente.id}">
                                    </option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Descrição</label>
                                <input type="text" th:field="*{descricao}" class="form-control" required>
                            </div>

                            <div class="form-group">
                                <label>Informações Adicionais</label>
                                <textarea class="form-control" rows="3"></textarea>                            </div>

                            <div class="row">
                                <div class="col-6">
                                    <div class="form-group">
                                        <label>Valor (R$)</label>
                                        <input type="number" step="0.01" th:field="*{valorOriginal}" class="form-control" required>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-group">
                                        <label>Vencimento</label>
                                        <input type="date" th:field="*{dataVencimento}" class="form-control" required>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                            <a href="/titulos" class="btn btn-default float-right">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
    <footer th:replace="~{fragments/geral :: footer}"></footer>
</div>
<div th:replace="~{fragments/geral :: scripts}"></div>
</body>
</html>
