    <style>
        .custom-switch-dark {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 1rem;
            color: #c2c7d0;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #3f6791; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Ajuste para o texto não sumir no dark mode */
        body.dark-mode .nav-link { color: #c2c7d0 !important; }
    </style>
</head>

    <script>
        <div th:fragment="scripts">
            <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

    <script>
        // Função Central que aplica o tema
        function aplicarTema(tema) {
            var body = document.body;
            var header = document.querySelector('.main-header'); // Pega a barra superior
            var switchInput = document.getElementById('darkModeSwitch');

            if (tema === 'dark') {
                // MODO ESCURO
                body.classList.add('dark-mode');

                // Força a barra superior a ficar escura
                if (header) {
                    header.classList.remove('navbar-white', 'navbar-light');
                    header.classList.add('navbar-dark');
                }

                // Marca o switch como ligado
                if (switchInput) switchInput.checked = true;

            } else {
                // MODO CLARO
                body.classList.remove('dark-mode');

                // Força a barra superior a ficar clara
                if (header) {
                    header.classList.remove('navbar-dark');
                    header.classList.add('navbar-white', 'navbar-light');
                }

                // Desmarca o switch
                if (switchInput) switchInput.checked = false;
            }
        }

        // Função do Botão (Toggle)
        function toggleDarkMode() {
            var currentTheme = localStorage.getItem('theme') || 'light';
            var newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            localStorage.setItem('theme', newTheme);
            aplicarTema(newTheme);
        }

        // EXECUÇÃO IMEDIATA (Assim que o script carrega)
        (function() {
            var savedTheme = localStorage.getItem('theme') || 'light';
            aplicarTema(savedTheme);
        })();

        // REFORÇO (Quando a página termina de carregar tudo, aplica de novo pra garantir)
        document.addEventListener("DOMContentLoaded", function() {
            var savedTheme = localStorage.getItem('theme') || 'light';
            aplicarTema(savedTheme);
        });

        $(document).ready(function(){
            // 1. Máscara Dinâmica de CPF/CNPJ
            var cpfCnpjBehavior = function (val) {
                    return val.replace(/\D/g, '').length <= 11 ? '000.000.000-009' : '00.000.000/0000-00';
                },
                cpfCnpjOptions = {
                    onKeyPress: function(val, e, field, options) {
                        field.mask(cpfCnpjBehavior.apply({}, arguments), options);
                    }
                };
            $('.mask-cpf-cnpj').mask(cpfCnpjBehavior, cpfCnpjOptions);

            // 2. Máscara Dinâmica de Telefone/WhatsApp (8 ou 9 dígitos)
            var SPMaskBehavior = function (val) {
                    return val.replace(/\D/g, '').length === 11 ? '(00) 00000-0000' : '(00) 0000-00009';
                },
                spOptions = {
                    onKeyPress: function(val, e, field, options) {
                        field.mask(SPMaskBehavior.apply({}, arguments), options);
                    }
                };
            $('.mask-telefone').mask(SPMaskBehavior, spOptions);
        });

    </script>
