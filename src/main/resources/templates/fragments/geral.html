<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head th:fragment="head">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Titu Gestão | Financeiro</title>

    <link rel="icon" type="image/png" href="/img/titu.png">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ttskch/select2-bootstrap4-theme@1.5.2/dist/select2-bootstrap4.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif !important;
        }
        .custom-switch-dark {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 1rem;
            color: #c2c7d0;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #3f6791; }
        input:checked + .slider:before { transform: translateX(20px); }
        body.dark-mode .nav-link { color: #c2c7d0 !important; }
    </style>
</head>

<body class="hold-transition sidebar-mini">

<nav th:fragment="navbar" class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
        <li class="nav-item">
            <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
        </li>
        <li class="nav-item d-none d-sm-inline-block">
            <a href="/" class="nav-link" th:classappend="${currentUri == '/' ? 'font-weight-bold text-primary' : ''}">Dashboard</a>
        </li>
        <li class="nav-item d-none d-sm-inline-block">
            <a href="/clientes" class="nav-link" th:classappend="${currentUri != null and currentUri.startsWith('/clientes') ? 'font-weight-bold text-primary' : ''}">Clientes</a>
        </li>
        <li class="nav-item d-none d-sm-inline-block">
            <a href="/titulos" class="nav-link" th:classappend="${currentUri != null and currentUri.startsWith('/titulos') ? 'font-weight-bold text-primary' : ''}">Títulos</a>
        </li>
    </ul>

    <ul class="navbar-nav ml-auto">
        <li class="nav-item dropdown">
            <a class="nav-link d-flex align-items-center" data-toggle="dropdown" href="#" style="padding-right: 1.5rem;">
                <i class="fas fa-user-circle mr-2" style="font-size: 1.5rem;"></i>
                <span class="d-none d-md-inline text-dark font-weight-bold" th:text="${usuarioLogado.nome}">Usuário</span>
            </a>
            <div class="dropdown-menu dropdown-menu-lg dropdown-menu-right">
                <span class="dropdown-item dropdown-header text-left">Logado como: <b th:text="${usuarioLogado.nome}">Usuário</b></span>
                <div class="dropdown-divider"></div>
                <a href="/configuracoes" class="dropdown-item">
                    <i class="fas fa-id-badge mr-2"></i> Meu Perfil
                </a>
                <a href="/configuracoes" class="dropdown-item">
                    <i class="fas fa-cog mr-2"></i> Configurações
                </a>
                <div class="dropdown-divider"></div>

                <form id="form-logout" th:action="@{/logout}" method="post" class="d-none"></form>

                <a href="#" class="dropdown-item text-danger font-weight-bold" onclick="document.getElementById('form-logout').submit(); return false;">
                    <i class="fas fa-sign-out-alt mr-2"></i> Sair do Sistema
                </a>
            </div>
        </li>
    </ul>
</nav>

<aside th:fragment="sidebar" class="main-sidebar sidebar-dark-primary elevation-4" style="height: 100vh; display: flex; flex-direction: column;">
    <a href="/" class="brand-link">
        <span class="brand-text font-weight-light ml-3">💰 <b>Titu</b>Gestão</span>
    </a>

    <div class="sidebar" style="flex-grow: 1; display: flex; flex-direction: column;">
        <nav class="mt-2" style="flex-grow: 1;">
            <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">

                <li class="nav-item">
                    <a href="/" class="nav-link" th:classappend="${currentUri == '/' ? 'active' : ''}">
                        <i class="nav-icon fas fa-tachometer-alt"></i>
                        <p>Dashboard</p>
                    </a>
                </li>

                <li class="nav-item">
                    <a href="/clientes" class="nav-link" th:classappend="${currentUri != null and currentUri.startsWith('/clientes') ? 'active' : ''}">
                        <i class="nav-icon fas fa-users"></i>
                        <p>Clientes</p>
                    </a>
                </li>

                <li class="nav-item">
                    <a href="/titulos" class="nav-link" th:classappend="${currentUri != null and currentUri.startsWith('/titulos') ? 'active' : ''}">
                        <i class="nav-icon fas fa-file-invoice-dollar"></i>
                        <p>Títulos</p>
                    </a>
                </li>

            </ul>
        </nav>

        <div class="mt-auto border-top border-secondary pt-2 pb-3">
            <ul class="nav nav-pills nav-sidebar flex-column">

                <li class="nav-item">
                    <a href="#" class="nav-link" onclick="toggleDarkMode(); return false;">
                        <i class="nav-icon fas fa-moon"></i>

                        <p>
                            Modo Escuro

                            <span class="right" style="margin-top: -2px;">
                        <label class="switch mb-0" style="transform: scale(0.7); transform-origin: right center;" onclick="event.stopPropagation();">
                            <input type="checkbox" id="darkModeSwitch" onclick="toggleDarkMode()">
                            <span class="slider"></span>
                        </label>
                    </span>
                        </p>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a href="/usuarios" class="nav-link" th:classappend="${currentUri != null and currentUri.startsWith('/usuarios') ? 'active' : ''}">
                        <i class="nav-icon fas fa-user-tie"></i>
                        <p>Equipe / Usuários</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/configuracoes" class="nav-link" th:classappend="${currentUri != null and currentUri.startsWith('/configuracoes') ? 'active' : ''}">
                        <i class="nav-icon fas fa-cog"></i>
                        <p>Configurações</p>
                    </a>
                </li>

            </ul>
        </div>
    </div>
</aside>

<footer th:fragment="footer" class="main-footer">
    <div class="float-right d-none d-sm-block"><b>Versão</b> 1.0.0</div>
    <strong>Copyright &copy; 2026 Titu System.</strong>
</footer>

<div th:fragment="scripts">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>


    <script>
        function aplicarTema(tema) {
            var body = document.body;
            var header = document.querySelector('.main-header');
            var switchInput = document.getElementById('darkModeSwitch');

            if (tema === 'dark') {
                body.classList.add('dark-mode');
                if (header) {
                    header.classList.remove('navbar-white', 'navbar-light');
                    header.classList.add('navbar-dark');
                }
                if (switchInput) switchInput.checked = true;
            } else {
                body.classList.remove('dark-mode');
                if (header) {
                    header.classList.remove('navbar-dark');
                    header.classList.add('navbar-white', 'navbar-light');
                }
                if (switchInput) switchInput.checked = false;
            }
        }

        function toggleDarkMode() {
            var currentTheme = localStorage.getItem('theme') || 'light';
            var newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            aplicarTema(newTheme);
        }

        (function() {
            var savedTheme = localStorage.getItem('theme') || 'light';
            aplicarTema(savedTheme);
        })();

        document.addEventListener("DOMContentLoaded", function() {
            var savedTheme = localStorage.getItem('theme') || 'light';
            aplicarTema(savedTheme);
        });

        $(document).ready(function(){
            var cpfCnpjBehavior = function (val) {
                    return val.replace(/\D/g, '').length <= 11 ? '000.000.000-009' : '00.000.000/0000-00';
                },
                cpfCnpjOptions = {
                    onKeyPress: function(val, e, field, options) {
                        field.mask(cpfCnpjBehavior.apply({}, arguments), options);
                    }
                };
            $('.mask-cpf-cnpj').mask(cpfCnpjBehavior, cpfCnpjOptions);

            var SPMaskBehavior = function (val) {
                    return val.replace(/\D/g, '').length === 11 ? '(00) 00000-0000' : '(00) 0000-00009';
                },
                spOptions = {
                    onKeyPress: function(val, e, field, options) {
                        field.mask(SPMaskBehavior.apply({}, arguments), options);
                    }
                };
            $('.mask-telefone').mask(SPMaskBehavior, spOptions);
        });
    </script>
</div>
</body>
</html>
